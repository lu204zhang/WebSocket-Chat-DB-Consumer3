server.port=8081

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.consumer.threads=20
app.consumer.prefetch=10
app.consumer.concurrent-consumers-per-queue=1
app.consumer.max-retries=3
app.consumer.retry-track-max-size=50000
app.rabbitmq.network-recovery-interval=5000
app.rabbitmq.exchange=chat.exchange
app.rabbitmq.queue-prefix=room.
# Must match existing queue args if queues already exist (e.g. server Part 1)
app.rabbitmq.queue-message-ttl=60000
app.rabbitmq.queue-max-length=1000

# Deduplication (processed messageId cache)
app.dedup.cache-ttl-minutes=5
app.dedup.cache-max-size=50000

# DynamoDB
aws.dynamodb.endpoint-url=http://localhost:8000
aws.dynamodb.region=us-east-1
aws.dynamodb.access-key=test
aws.dynamodb.secret-key=test

app.dynamodb.table.messages=ChatMessages
app.dynamodb.table.user-activity=UserActivity
app.dynamodb.table.room-analytics=RoomAnalytics
app.dynamodb.billing-mode=PAY_PER_REQUEST
app.dynamodb.connection-pool.max-size=50

# Circuit Breaker (Resilience4j)
# dynamodb-messages: ChatMessages writes — failures route to DLQ
resilience4j.circuitbreaker.instances.dynamodb-messages.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.dynamodb-messages.sliding-window-size=50
resilience4j.circuitbreaker.instances.dynamodb-messages.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.dynamodb-messages.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.dynamodb-messages.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.dynamodb-messages.automatic-transition-from-open-to-half-open-enabled=true
# dynamodb-stats: UserActivity + RoomAnalytics writes — failures are logged and dropped
resilience4j.circuitbreaker.instances.dynamodb-stats.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.dynamodb-stats.sliding-window-size=50
resilience4j.circuitbreaker.instances.dynamodb-stats.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.dynamodb-stats.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.dynamodb-stats.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.dynamodb-stats.automatic-transition-from-open-to-half-open-enabled=true

# Retry
app.retry.max-attempts=3
app.retry.backoff-base-ms=100

# Analytics
app.analytics.top-rooms-limit=5
app.analytics.top-users-limit=10

# Write-Behind
# Internal buffer capacity (per queue: messageQueue and statsQueue)
app.writebehind.queue-capacity=10000
# Max messages drained per flush cycle
app.writebehind.batch-size=500
# Flush interval in milliseconds
app.writebehind.flush-interval-ms=500
# Thread pool sizes
app.writebehind.db-writer-threads=4
app.writebehind.stats-threads=2
# In-memory DLQ capacity (items beyond this are only logged)
app.writebehind.dlq-capacity=5000
